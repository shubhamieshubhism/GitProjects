services:
  webgoat:
    image: webgoat/goatandwolf:latest
    container_name: webgoat
    ports:
      - "8080:8080"
    environment:
      - WEBGOAT_PORT=8080

  zap:
    image: zaproxy/zap-stable:latest
    container_name: zap
    environment:
      - ZAP_JVM_OPTS=-Xmx1g
    command:
      [
        "zap.sh",
        "-daemon",
        "-port",
        "8090",
        "-host",
        "0.0.0.0",
        "-config",
        "api.disablekey=true",
        "-config",
        "api.addrs.addr.name=.*",
        "-config",
        "api.addrs.addr.regex=true",
      ]
    ports:
      - "8090:8090"
