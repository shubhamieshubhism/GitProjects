<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E‑Store | Full Cart Functionality</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s, color 0.2s; }
    :root {
      --bg-body: #f8f9fa; --bg-surface: #ffffff; --text-primary: #212529;
      --text-secondary: #495057; --border: #dee2e6; --accent: #0d6efd; --accent-hover: #0b5ed7;
    }
    body.dark {
      --bg-body: #121212; --bg-surface: #1e1e2f; --text-primary: #f1f3f5;
      --text-secondary: #ced4da; --border: #2c2c3a; --accent: #3b82f6; --accent-hover: #2563eb;
    }
    body { background-color: var(--bg-body); color: var(--text-primary); font-family: system-ui; }
    .container { max-width: 1280px; margin: 0 auto; padding: 1rem; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 1rem; }
    .logo h1 { font-size: 1.8rem; color: var(--accent); }
    .controls { display: flex; gap: 1rem; align-items: center; }
    button { background-color: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 500; }
    button:hover { background-color: var(--accent-hover); }
    .cart-badge { background-color: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px; padding: 0.3rem 0.8rem; cursor: pointer; }
    .cart-badge:hover { background-color: var(--border); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; margin: 2rem 0; }
    .product-card { background-color: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
    .product-card.highlight { background-color: #fff3cd; border: 2px solid #ffc107; }
    body.dark .product-card.highlight { background-color: #664d03; border-color: #ffca2c; }
    .product-name { font-weight: bold; }
    .product-price { color: var(--accent); margin-top: 0.5rem; }
    .product-category { font-size: 0.8rem; color: var(--text-secondary); }
    .widget { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; flex: 1; min-width: 200px; }
    .widget-content { margin-top: 0.5rem; }
    .widget-item { padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
    footer { margin-top: 3rem; padding: 1.5rem 0; text-align: center; border-top: 1px solid var(--border); }

    /* Cart Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background-color: var(--bg-surface);
      border-radius: 16px;
      max-width: 500px;
      width: 90%;
      max-height: 80%;
      overflow-y: auto;
      padding: 1.5rem;
      position: relative;
    }
    .close-modal {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      color: var(--text-primary);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0;
    }

    .widget-content {
      margin-top: 0.5rem;
      min-height: 60px;   /* ensures a visible area even when empty */
    }

    
    .cart-item-info { flex: 2; }
    .cart-item-actions { display: flex; gap: 0.5rem; align-items: center; }
    .cart-total { font-weight: bold; margin-top: 1rem; text-align: right; }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="logo"><h1 data-testid="store-title">⚡ E‑Store</h1></div>
    <div class="controls">
      <div class="cart-badge" data-testid="cart-indicator" id="cartBadge">🛒 0 items</div>
      <button data-testid="dark-mode-toggle" id="darkModeToggle">🌓 Dark Mode</button>
    </div>
  </div>

  <main>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
      <h2>All Products</h2>
      <button data-testid="random-product-highlight" id="randomHighlightBtn">🎲 Highlight random product</button>
    </div>
    <div style="margin-bottom: 1rem;">
      <label>Filter by category: </label>
      <select id="categoryFilter" data-testid="category-filter">
        <option value="all">All</option>
        <option value="Electronics">Electronics</option><option value="Clothing">Clothing</option>
        <option value="Home">Home</option><option value="Books">Books</option><option value="Toys">Toys</option>
      </select>
    </div>
    <div data-testid="product-list" class="products-grid" id="productGrid"></div>

    <div class="widgets-section" style="display: flex; gap: 2rem; margin-top: 2rem; flex-wrap: wrap;">
      <div class="widget" data-testid="widget-recommended" id="recommendedWidget">
        <div style="display: flex; justify-content: space-between;"><h3>🔥 Recommended</h3><button data-testid="toggle-recommended" id="toggleRecommendedBtn">Hide</button></div>
        <div id="recommendedContent" class="widget-content"></div>
      </div>
      <div class="widget" data-testid="widget-recently-viewed" id="recentlyViewedWidget">
        <div style="display: flex; justify-content: space-between;"><h3>🕒 Recently Viewed</h3><button data-testid="toggle-recently-viewed" id="toggleRecentlyBtn">Hide</button></div>
        <div id="recentlyViewedContent" class="widget-content"></div>
      </div>
    </div>

    <div style="margin: 2rem 0; padding: 1rem; background: var(--bg-surface); border-radius: 12px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>🛠️ Dev Tools</h3>
        <button data-testid="capture-snapshot" id="captureSnapshotBtn">📸 Capture DOM Snapshot</button>
      </div>
      <textarea id="snapshotOutput" rows="6" style="width:100%; margin-top:0.5rem; font-family:monospace; background: var(--bg-body); border:1px solid var(--border);" readonly placeholder="Snapshot will appear here..."></textarea>
      <div style="margin-top: 1rem; display: flex; gap: 1rem; align-items: center;">
        <span data-testid="timestamp-display" id="timestampDisplay"></span>
        <button data-testid="simulate-ci-run" id="simulateCiBtn">⏱️ Simulate CI run</button>
      </div>
    </div>
  </main>
  <footer><p>© 2026 E‑Store | Click cart badge to view items</p></footer>
</div>

<!-- Cart Modal -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <button class="close-modal" id="closeModalBtn">&times;</button>
    <h3>Your Cart</h3>
    <div id="cartItemsContainer"></div>
    <div id="cartTotal" class="cart-total"></div>
    <button id="clearCartBtn" style="margin-top: 1rem; background-color: #dc3545;">Clear Cart</button>
  </div>
</div>

<script>
  // ---- Dark mode ----
  const toggleBtn = document.getElementById('darkModeToggle');
  const applyTheme = (isDark) => { if(isDark) document.body.classList.add('dark'); else document.body.classList.remove('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); };
  if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  else if(localStorage.getItem('theme') === 'light') document.body.classList.remove('dark');
  else if(window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark');
  toggleBtn.addEventListener('click', () => { const isDark = document.body.classList.toggle('dark'); applyTheme(isDark); });

  // ---- Generate 500 products ----
  const categories = ['Electronics','Clothing','Home','Books','Toys'];
  const productNames = ['Wireless Headphones','Smart Watch','Cotton T-Shirt','Coffee Mug','Novel','Backpack','Desk Lamp','Gaming Mouse','Yoga Mat','Running Shoes','Sunglasses','Power Bank'];
  const products = [];
  for(let i=1;i<=500;i++) {
    products.push({
      id: `prod_${String(i).padStart(4,'0')}`,
      name: `${productNames[i%productNames.length]} #${i}`,
      price: parseFloat((Math.random()*150+9.99).toFixed(2)),
      category: categories[i%categories.length],
    });
  }
  function escapeHtml(s) { return s.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // ---- Cart state (array of {id, quantity}) ----
  let cart = [];
  function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }
  function loadCart() {
    const saved = localStorage.getItem('cart');
    if(saved) cart = JSON.parse(saved);
    else cart = [];
  }
  loadCart();

  function updateCartBadge() {
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.querySelector('[data-testid="cart-indicator"]').innerText = `🛒 ${totalItems} items`;
  }
  function addToCart(productId) {
    const existing = cart.find(item => item.id === productId);
    if(existing) existing.quantity++;
    else cart.push({ id: productId, quantity: 1 });
    saveCart();
    updateCartBadge();
    // Also add to recently viewed
    addToRecentlyViewed(productId);
  }
  function removeFromCart(productId) {
    cart = cart.filter(item => item.id !== productId);
    saveCart();
    updateCartBadge();
    renderCartModal(); // refresh modal if open
  }
  function updateQuantity(productId, delta) {
    const item = cart.find(i => i.id === productId);
    if(item) {
      item.quantity += delta;
      if(item.quantity <= 0) removeFromCart(productId);
      else { saveCart(); updateCartBadge(); renderCartModal(); }
    }
  }
  function clearCart() {
    cart = [];
    saveCart();
    updateCartBadge();
    renderCartModal();
  }

  // Render cart modal content
  function renderCartModal() {
    const container = document.getElementById('cartItemsContainer');
    if(!container) return;
    if(cart.length === 0) {
      container.innerHTML = '<p>Your cart is empty.</p>';
      document.getElementById('cartTotal').innerText = '';
      return;
    }
    let html = '';
    let total = 0;
    cart.forEach(item => {
      const product = products.find(p => p.id === item.id);
      if(!product) return;
      const subtotal = product.price * item.quantity;
      total += subtotal;
      html += `
        <div class="cart-item">
          <div class="cart-item-info">
            <strong>${escapeHtml(product.name)}</strong><br>
            $${product.price.toFixed(2)} x ${item.quantity} = $${subtotal.toFixed(2)}
          </div>
          <div class="cart-item-actions">
            <button class="cart-qty-minus" data-id="${item.id}">-</button>
            <span>${item.quantity}</span>
            <button class="cart-qty-plus" data-id="${item.id}">+</button>
            <button class="cart-remove" data-id="${item.id}">🗑️</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    document.getElementById('cartTotal').innerHTML = `<strong>Total: $${total.toFixed(2)}</strong>`;
    // attach events
    document.querySelectorAll('.cart-qty-minus').forEach(btn => {
      btn.addEventListener('click', () => updateQuantity(btn.getAttribute('data-id'), -1));
    });
    document.querySelectorAll('.cart-qty-plus').forEach(btn => {
      btn.addEventListener('click', () => updateQuantity(btn.getAttribute('data-id'), 1));
    });
    document.querySelectorAll('.cart-remove').forEach(btn => {
      btn.addEventListener('click', () => removeFromCart(btn.getAttribute('data-id')));
    });
  }

  // Modal open/close
  const modal = document.getElementById('cartModal');
  const openModal = () => { renderCartModal(); modal.style.display = 'flex'; };
  const closeModal = () => { modal.style.display = 'none'; };
  document.getElementById('cartBadge').addEventListener('click', openModal);
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('clearCartBtn').addEventListener('click', clearCart);
  window.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

  updateCartBadge();

  // ---- Product listing with filter ----
  let currentFilter = 'all';
  const productGrid = document.getElementById('productGrid');
  function renderProducts() {
    const filtered = currentFilter==='all' ? products : products.filter(p=>p.category===currentFilter);
    productGrid.innerHTML = '';
    filtered.forEach(p=>{
      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('data-product-id', p.id);
      card.setAttribute('data-category', p.category);
      card.innerHTML = `
        <div class="product-name">${escapeHtml(p.name)}</div>
        <div class="product-category">${escapeHtml(p.category)}</div>
        <div class="product-price">$${p.price.toFixed(2)}</div>
        <button class="add-to-cart-btn" data-id="${p.id}" data-testid="add-to-cart-${p.id}">Add to cart</button>
      `;
      productGrid.appendChild(card);
    });
  }
  document.getElementById('categoryFilter').addEventListener('change', e=>{ currentFilter = e.target.value; renderProducts(); });
  renderProducts();

  // Highlight random product
  document.getElementById('randomHighlightBtn').addEventListener('click', ()=>{
    document.querySelectorAll('.product-card.highlight').forEach(c=>c.classList.remove('highlight'));
    const cards = document.querySelectorAll('.product-card');
    if(cards.length) { const idx=Math.floor(Math.random()*cards.length); cards[idx].classList.add('highlight'); cards[idx].scrollIntoView({behavior:'smooth',block:'center'}); }
  });

  // Listen to "Add to cart" clicks (event delegation)
  document.addEventListener('click', (e) => {
    if(e.target.classList && e.target.classList.contains('add-to-cart-btn')) {
      addToCart(e.target.getAttribute('data-id'));
    }
  });

  // ---- Recently viewed (store last 3 unique product IDs) ----
  let recentlyViewedIds = [];
  function addToRecentlyViewed(productId) {
    recentlyViewedIds = [productId, ...recentlyViewedIds.filter(id => id !== productId)].slice(0, 3);
    const container = document.getElementById('recentlyViewedContent');
    const viewed = recentlyViewedIds.map(id => products.find(p => p.id === id)).filter(Boolean);
    container.innerHTML = viewed.map(p => `<div class="widget-item">${escapeHtml(p.name)} - $${p.price.toFixed(2)}</div>`).join('');
  }

  // ---- Recommended widget ----
  function updateRecommended(){
    const shuffled = [...products];
    for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
    const recs = shuffled.slice(0,3);
    document.getElementById('recommendedContent').innerHTML = recs.map(p=>`<div class="widget-item">${escapeHtml(p.name)} - $${p.price.toFixed(2)}</div>`).join('');
  }
  updateRecommended();

  // Toggle widgets
  let recVisible=true, recViewVisible=true;
  // Ensure both widget contents are visible by default
  document.getElementById('recommendedContent').style.display = 'block';
  document.getElementById('recentlyViewedContent').style.display = 'block';

  document.getElementById('toggleRecommendedBtn').addEventListener('click',()=>{ recVisible=!recVisible; document.getElementById('recommendedContent').style.display=recVisible?'block':'none'; document.getElementById('toggleRecommendedBtn').textContent=recVisible?'Hide':'Show'; });
  document.getElementById('toggleRecentlyBtn').addEventListener('click',()=>{ recViewVisible=!recViewVisible; document.getElementById('recentlyViewedContent').style.display=recViewVisible?'block':'none'; document.getElementById('toggleRecentlyBtn').textContent=recViewVisible?'Hide':'Show'; });

  // Timestamp & CI simulate
  function updateTimestamp(){ document.getElementById('timestampDisplay').innerText = `🕒 ${new Date().toLocaleString()}`; }
  setInterval(updateTimestamp,1000); updateTimestamp();
  document.getElementById('simulateCiBtn').addEventListener('click',()=>{ const start=performance.now(); setTimeout(()=>{ const dur=(performance.now()-start).toFixed(2); console.log(`[CI Simulation] ${dur} ms`); alert(`CI run: ${dur} ms`); },50); });

  // Snapshot generator
  document.getElementById('captureSnapshotBtn').addEventListener('click',()=>{
    const interactive = document.querySelectorAll('[data-testid], [id], button, input, select, a, .product-card');
    const snap = Array.from(interactive).map(el=>({
      tag:el.tagName, testId:el.getAttribute('data-testid'), id:el.id,
      className:el.className, text:el.innerText?.slice(0,60),
      recLocator: el.getAttribute('data-testid')?`page.locator('[data-testid="${el.getAttribute('data-testid')}"]')`:(el.id?`page.locator('#${el.id}')`:null)
    })).filter(x=>x.testId||x.id||x.className?.includes('product-card'));
    document.getElementById('snapshotOutput').value = JSON.stringify(snap,null,2);
  });
</script>
</body>
</html>
