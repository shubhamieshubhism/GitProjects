syntax = "proto3";
package product;
service ProductService {
  rpc GetProduct (ProductRequest) returns (Product);
  rpc ListProducts (Empty) returns (stream Product);
}
message ProductRequest { string id = 1; }
message Product {
  string id = 1;
  string name = 2;
  double price = 3;
  string category = 4;
}
message Empty {}